<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" width="900" height="200">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#04001a"/>
      <stop offset="65%" stop-color="#1a0045"/>
      <stop offset="100%" stop-color="#3a006f"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#150035"/>
      <stop offset="100%" stop-color="#04001a"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff80ab"/>
      <stop offset="45%" stop-color="#ff4081"/>
      <stop offset="100%" stop-color="#ff6d00"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#ff4081"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="neon" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="7" result="b1"/>
      <feGaussianBlur stdDeviation="14" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="hglow" x="-5%" y="-200%" width="110%" height="500%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="sglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="sunclip">
      <rect x="370" y="60" width="160" height="80"/>
    </clipPath>
    <clipPath id="groundclip">
      <rect x="0" y="138" width="900" height="62"/>
    </clipPath>
  </defs>

  <!-- Sky background -->
  <rect width="900" height="200" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="15"  cy="10" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="55"  cy="22" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="95"  cy="8"  r="1.4" fill="white" opacity="0.8"/>
  <circle cx="138" cy="30" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="175" cy="12" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="220" cy="5"  r="0.8" fill="white" opacity="0.7"/>
  <circle cx="265" cy="25" r="1.1" fill="white" opacity="0.8"/>
  <circle cx="300" cy="14" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="625" cy="18" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="660" cy="6"  r="0.9" fill="white" opacity="0.7"/>
  <circle cx="710" cy="28" r="1.3" fill="white" opacity="0.9"/>
  <circle cx="752" cy="11" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="800" cy="22" r="1.1" fill="white" opacity="0.8"/>
  <circle cx="845" cy="7"  r="0.9" fill="white" opacity="0.7"/>
  <circle cx="882" cy="19" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="40"  cy="50" r="0.7" fill="#ff80ab" opacity="0.6"/>
  <circle cx="190" cy="45" r="0.8" fill="#80d8ff" opacity="0.7"/>
  <circle cx="740" cy="48" r="0.7" fill="#ff80ab" opacity="0.6"/>
  <circle cx="870" cy="42" r="0.8" fill="#80d8ff" opacity="0.7"/>

  <!-- Sun glow halo behind -->
  <circle cx="450" cy="138" r="68" fill="#ff4081" opacity="0.18" filter="url(#sglow)"/>

  <!-- Sun (semicircle) -->
  <circle cx="450" cy="138" r="58" fill="url(#sunGrad)" clip-path="url(#sunclip)"/>
  <!-- Sun stripes -->
  <rect x="392" y="138" width="116" height="7"  fill="#04001a" opacity="0.85"/>
  <rect x="392" y="149" width="116" height="6"  fill="#04001a" opacity="0.85"/>
  <rect x="392" y="159" width="116" height="5"  fill="#04001a" opacity="0.85"/>
  <rect x="392" y="168" width="116" height="5"  fill="#04001a" opacity="0.85"/>

  <!-- Horizon glow line -->
  <rect x="0" y="136" width="900" height="3" fill="#ff4081" opacity="0.6" filter="url(#hglow)"/>
  <rect x="0" y="137" width="900" height="2" fill="#ff80ab" opacity="0.9"/>

  <!-- Ground -->
  <rect x="0" y="138" width="900" height="62" fill="url(#ground)"/>

  <!-- Grid — horizontal lines -->
  <line x1="0" y1="150" x2="900" y2="150" stroke="#d500f9" stroke-width="0.7" opacity="0.45"/>
  <line x1="0" y1="163" x2="900" y2="163" stroke="#d500f9" stroke-width="0.7" opacity="0.40"/>
  <line x1="0" y1="177" x2="900" y2="177" stroke="#d500f9" stroke-width="0.6" opacity="0.35"/>
  <line x1="0" y1="192" x2="900" y2="192" stroke="#d500f9" stroke-width="0.6" opacity="0.30"/>

  <!-- Grid — vertical lines (converging to horizon center 450,138) -->
  <line x1="0"   y1="200" x2="450" y2="138" stroke="#d500f9" stroke-width="0.6" opacity="0.35"/>
  <line x1="100" y1="200" x2="450" y2="138" stroke="#d500f9" stroke-width="0.6" opacity="0.35"/>
  <line x1="200" y1="200" x2="450" y2="138" stroke="#d500f9" stroke-width="0.6" opacity="0.35"/>
  <line x1="300" y1="200" x2="450" y2="138" stroke="#d500f9" stroke-width="0.6" opacity="0.35"/>
  <line x1="400" y1="200" x2="450" y2="138" stroke="#d500f9" stroke-width="0.6" opacity="0.35"/>
  <line x1="500" y1="200" x2="450" y2="138" stroke="#d500f9" stroke-width="0.6" opacity="0.35"/>
  <line x1="600" y1="200" x2="450" y2="138" stroke="#d500f9" stroke-width="0.6" opacity="0.35"/>
  <line x1="700" y1="200" x2="450" y2="138" stroke="#d500f9" stroke-width="0.6" opacity="0.35"/>
  <line x1="800" y1="200" x2="450" y2="138" stroke="#d500f9" stroke-width="0.6" opacity="0.35"/>
  <line x1="900" y1="200" x2="450" y2="138" stroke="#d500f9" stroke-width="0.6" opacity="0.35"/>

  <!-- HELLO WORLD — shadow/outline layer -->
  <text x="450" y="108" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="62" font-weight="900" letter-spacing="4"
    fill="#ff4081" opacity="0.35" filter="url(#neon)">HELLO WORLD</text>

  <!-- HELLO WORLD — main neon text -->
  <text x="450" y="108" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="62" font-weight="900" letter-spacing="4"
    fill="url(#textGrad)" filter="url(#neon)">HELLO WORLD</text>
</svg>
